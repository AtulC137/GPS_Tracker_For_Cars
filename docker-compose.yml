services:
  postgres:
    image: postgis/postgis:16-3.4
    restart: unless-stopped
    environment:
      POSTGRES_USER: fleet
      POSTGRES_PASSWORD: fleet
      POSTGRES_DB: fleet
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fleet -d fleet"]
      interval: 5s
      timeout: 5s
      retries: 10

  adminer:
    image: adminer:latest
    profiles: ["dev"]
    ports:
      - "${ADMINER_PORT:-8081}:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    depends_on:
      postgres:
        condition: service_healthy

  # MQTT broker for OwnTracks MQTT mode. Optional — does not affect HTTP/ngrok or AIS-140.
  # Start with: docker compose --profile mqtt up -d
  # Combine with --profile phone for HTTP + MQTT together.
  mosquitto:
    image: eclipse-mosquitto:2
    profiles: ["mqtt"]
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/config:/mosquitto/config:ro

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql://fleet:fleet@postgres:5432/fleet
      PORT: 3000
      HOST: 0.0.0.0
      INGEST_TOKEN: ${INGEST_TOKEN:-change-me}
      INGEST_OPEN_FOR_TESTING: ${INGEST_OPEN_FOR_TESTING:-false}
      AUTO_REGISTER_OWTRACKS_PHONES: ${AUTO_REGISTER_OWTRACKS_PHONES:-true}
      OFFLINE_THRESHOLD_SEC: ${OFFLINE_THRESHOLD_SEC:-300}
      CORS_ORIGINS: http://localhost:5173,http://localhost:8080
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-change-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      DEFAULT_ORG_ID: ${DEFAULT_ORG_ID:-org_demo_fleet}
      PUBLIC_AIS140_TCP_HOST: ${PUBLIC_AIS140_TCP_HOST:-localhost}
      PUBLIC_AIS140_TCP_PORT: ${PUBLIC_AIS140_TCP_PORT:-5000}
      PUBLIC_OWTRACKS_HTTP_URL: ${PUBLIC_OWTRACKS_HTTP_URL:-http://localhost:3000/api/v1/ingest/owntracks}
      PUBLIC_OWTRACKS_MQTT_HOST: ${PUBLIC_OWTRACKS_MQTT_HOST:-localhost}
      PUBLIC_OWTRACKS_MQTT_PORT: ${PUBLIC_OWTRACKS_MQTT_PORT:-1883}
      OWTRACKS_MQTT_ENABLED: ${OWNTRACKS_MQTT_ENABLED:-false}
      MQTT_URL: mqtt://mosquitto:1883
      OWTRACKS_MQTT_TOPIC: owntracks/#
      AIS140_TCP_ENABLED: ${AIS140_TCP_ENABLED:-true}
      AIS140_TCP_PORT: ${AIS140_TCP_PORT:-5000}
      AIS140_TCP_HOST: 0.0.0.0
      AIS140_VALIDATE_CHECKSUM: ${AIS140_VALIDATE_CHECKSUM:-false}
      AIS140_SEND_ACK: ${AIS140_SEND_ACK:-false}
      AIS140_DEMO_IMEI: ${AIS140_DEMO_IMEI:-888888888888999}
      RUN_SEED: ${RUN_SEED:-true}
    ports:
      - "3000:3000"
      - "5000:5000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      mosquitto:
        condition: service_started
        required: false

  frontend:
    build:
      context: ./frontend/gps-tracker-for-cars
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3000}
        VITE_WS_URL: ${VITE_WS_URL:-ws://localhost:3000/ws}
    restart: unless-stopped
    ports:
      - "8080:3000"
    depends_on:
      backend:
        condition: service_healthy

  # ngrok — exposes local backend to the internet (OwnTracks HTTP ingest).
  # Start with: docker compose --profile phone up -d
  #
  # STATIC DOMAIN (--domain=...)
  # Without --domain, ngrok assigns a random *.ngrok-free.app URL on every
  # container restart. OwnTracks would need reconfiguring each time. A reserved
  # static domain keeps the same public URL permanently.
  #
  # HTTP TUNNEL vs TCP TUNNEL
  # - HTTP tunnel (this service): forwards HTTPS to an HTTP server. Used here for
  #   OwnTracks HTTP mode → POST /api/v1/ingest/owntracks.
  # - TCP tunnel (not configured here): raw TCP port forwarding, e.g. for AIS-140
  #   VLT hardware that speaks NMR/binary protocol over TCP, not HTTP.
  #
  # AIS-140 TCP IN PRODUCTION
  # Maharashtra AIS-140 devices expect a stable TCP endpoint (fixed IP:port).
  # ngrok TCP tunnels are fine for dev/testing, but production should move to a
  # VPS with a static public IP so devices never need URL/IP changes.
  ngrok:
    image: ngrok/ngrok:latest
    profiles: ["phone"]
    restart: unless-stopped
    env_file: ./backend/.env
    command:
      - http
      - --domain=${NGROK_DOMAIN}
      - host.docker.internal:3000
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN}
    ports:
      - "4040:4040"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      backend:
        condition: service_healthy

  # AIS-140 TCP tunnel — reserved ngrok TCP address (paid plan).
  # Start with: docker compose --profile ais140 up -d --build
  # Set NGROK_TCP_ADDRESS in backend/.env (e.g. 1.tcp.in.ngrok.io:21234)
  ngrok-ais140:
    image: ngrok/ngrok:latest
    profiles: ["ais140"]
    restart: unless-stopped
    env_file: ./backend/.env
    command:
      - tcp
      - backend:5000
      - --url=tcp://${NGROK_TCP_ADDRESS}
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN}
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
